<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoodPatch Player</title>
    <link rel="stylesheet" href="style.css?v=9">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        /* Anti-flash untuk Token Gate */
        html.logged-in .token-overlay {
            display: none !important;
        }
    </style>
    <script>
        // Eksekusi instan sebelum halaman dirender untuk mencegah UI berkedip
        if (localStorage.getItem('moodpatch_valid_token') && (localStorage.getItem('moodpatch_token_expiration') || localStorage.getItem('moodpatch_token_type') === 'lifetime')) {
            document.documentElement.classList.add('logged-in');
        }  
    </script>
</head>
<body>
    
    <!-- Token Gate Overlay -->
    <div id="token-gate" class="token-overlay">
        <div class="token-panel glass-panel">
            <h2 class="token-title">Akses Khusus</h2>
            <p class="token-desc">Silakan masukkan tokenmu untuk menikmati MoodPatch Player.</p>
            <div class="token-input-group">
                <input type="text" id="token-input" class="token-input" placeholder="moodpatch-XXXX" autocomplete="off">
                <button id="token-submit" class="token-submit shadow-btn">Masuk</button>
            </div>
            <p id="token-error" class="token-error hidden">Token tidak valid. Silakan coba lagi.</p>
        </div>
    </div>

    <!-- Timer / Countdown Overlay -->
    <div id="expiration-overlay" class="expiration-overlay hidden">
        <div class="expiration-content">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9HVcMbXUuH1vO6cyu8U7p2SoFq9EDEhF29wERABi7q2JygRp1NulUhYgICEYGUaCfuqEYJLDXkgbq79kgOFZjP68CASfY80xDxrTS_YHm5FwaboW1MTCTjj4K3J_R66vYqN06NxSCGEckM4ugNKtMZ8ul0oWI_tzL9qUrj-RP_asNVPLoChDQEtT32uaNh4OCz1P6wBO1Q-fCfD4iJaQt2MpqkMzdAaBMOnq9KNDyl0fDaFzWVIAAT1u3bRVgvs1hcFxOhbr5Tl1i" alt="MoodPatch" class="expiration-logo">
            <p>Waktu Akses Berakhir</p>
            <span class="material-symbols-outlined icon-large">hourglass_empty</span>
            <p class="small-text">Batas waktu 3 hari telah berlalu.</p>
            <button id="relogin-btn" class="token-submit shadow-btn" style="margin-top: 1.5rem;">Masukkan Token Baru</button>
        </div>
    </div>

    <nav class="navbar">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9HVcMbXUuH1vO6cyu8U7p2SoFq9EDEhF29wERABi7q2JygRp1NulUhYgICEYGUaCfuqEYJLDXkgbq79kgOFZjP68CASfY80xDxrTS_YHm5FwaboW1MTCTjj4K3J_R66vYqN06NxSCGEckM4ugNKtMZ8ul0oWI_tzL9qUrj-RP_asNVPLoChDQEtT32uaNh4OCz1P6wBO1Q-fCfD4iJaQt2MpqkMzdAaBMOnq9KNDyl0fDaFzWVIAAT1u3bRVgvs1hcFxOhbr5Tl1i" alt="MoodPatch" class="logo-img">
        <div class="nav-actions">
            <div class="timer">
                <span class="material-symbols-outlined timer-icon">timer</span>
                <span id="countdown">Memuat...</span>
            </div>
            <button id="logout-btn" class="logout-btn" title="Keluar">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </nav>

    <main class="player-container">
        <div class="glass-panel">
            <div class="album-art-container">
                <img src="https://res.cloudinary.com/uvrpnw8s/image/upload/v1783675111/album_art_kqhkg6.jpg" alt="Album Art" id="album-art" class="album-art">
                <div class="center-hole"></div>
            </div>
            
            <div class="song-info">
                <h2 class="song-title">Gamelan Ketenangan</h2>
                <p class="artist-name">MoodPatch Originals</p>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-container" class="progress-slider" min="0" max="100" value="0" step="any">
                <span id="duration">3:45</span>
            </div>

            <div class="controls">
                <button class="control-btn secondary" id="shuffle" title="Acak">
                    <span class="material-symbols-outlined">shuffle</span>
                </button>
                <button class="control-btn primary" id="prev" title="Sebelumnya">
                    <span class="material-symbols-outlined">skip_previous</span>
                </button>
                <button class="control-btn play-pause shadow-btn" id="play" title="Putar">
                    <span class="material-symbols-outlined" id="play-icon">play_arrow</span>
                </button>
                <button class="control-btn primary" id="next" title="Selanjutnya">
                    <span class="material-symbols-outlined">skip_next</span>
                </button>
                <button class="control-btn secondary" id="repeat" title="Ulangi">
                    <span class="material-symbols-outlined">repeat</span>
                </button>
            </div>
            
            <div class="volume-container">
                <span class="material-symbols-outlined">volume_down</span>
                <input type="range" id="volume" min="0" max="1" step="any" value="0.7" class="volume-slider">
                <span class="material-symbols-outlined">volume_up</span>
            </div>
        </div>
    </main>

    <audio id="audio" src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_2e2cc2eb10.mp3?filename=gamelan-loop-1-124083.mp3"></audio>
    <script src="script.js?v=11"></script>
</body>
</html>
